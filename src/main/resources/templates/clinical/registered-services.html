<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Dịch vụ điều trị', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Tiếp đón và khám bệnh / Dịch vụ điều trị</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Dịch vụ điều trị</h2>
            <p class="page-sub">Bệnh nhân: <strong th:text="${examSession.patient.fullName}"></strong>
                - Phiên khám <span th:text="${examSession.sessionCode}"></span></p>
        </div>
        <div>
            <a th:href="@{/clinical/examination(sessionId=${examSession.id})}" class="btn btn-secondary">Quay lại phiên khám</a>
        </div>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);" th:if="${examSession.status.name() == 'OPEN'}">
        <div class="page-header" style="margin-bottom:var(--space-2);">
            <h3 class="card-section-title">Đăng ký dịch vụ mới</h3>
        </div>
        <form method="post" th:action="@{/clinical/services}" th:object="${registeredServiceForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="sessionId" th:value="${examSession.id}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label>Dịch vụ <span style="color:var(--error)">*</span></label>
                    <select name="serviceId" class="form-control" required>
                        <option value="">-- Chọn dịch vụ --</option>
                        <option th:each="s : ${dentalServices}" th:value="${s.id}"
                                th:with="price=${servicePricesByServiceId.get(s.id)}"
                                th:disabled="${price == null}"
                                th:text="${s.name + ' - ' + (price != null ? #numbers.formatDecimal(price, 0, 'COMMA', 0, 'POINT') + ' VND' : 'Chưa có giá') + ' (' + s.unit.label + ')'}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Số lượng <span style="color:var(--error)">*</span></label>
                    <input type="number" name="quantity" class="form-control" min="1" value="1" required/>
                </div>
                <div class="form-group">
                    <label>Giảm giá (VNĐ)</label>
                    <input type="number" name="discountAmount" class="form-control" min="0" step="1000" value="0"/>
                </div>
                <div class="form-group">
                    <label>Số răng (nếu có)</label>
                    <input type="number" name="toothNumber" class="form-control" min="11" max="48"/>
                </div>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea name="note" class="form-control" rows="2"></textarea>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn btn-primary">Đăng ký dịch vụ</button>
            </div>
        </form>
    </div>

    <div class="card table-responsive">
        <div class="page-header" style="margin-bottom:var(--space-2);">
            <h3 class="card-section-title">Danh sách dịch vụ đã đăng ký</h3>
        </div>
        <table class="data-table">
            <thead>
            <tr>
                <th>Dịch vụ</th>
                <th>Đơn vị</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
                <th>Giảm giá</th>
                <th>Thành tiền</th>
                <th>Răng</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${registeredServices}">
                <td th:text="${r.serviceNameSnapshot}"></td>
                <td th:text="${r.unitSnapshot.label}"></td>
                <td th:text="${r.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(r.unitPrice, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${#numbers.formatDecimal(r.discountAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td><strong th:text="${#numbers.formatDecimal(r.totalAmount, 0, 'COMMA', 0, 'POINT')}"></strong></td>
                <td th:text="${r.toothNumber ?: '-'}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${r.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-cancelled'"
                          th:text="${r.status.label}"></span>
                </td>
                <td>
                    <form method="post" th:action="@{/clinical/services/{id}/cancel(id=${r.id})}"
                          th:if="${r.status.name() == 'ACTIVE' and examSession.status.name() == 'OPEN'}"
                          onsubmit="return confirm('Xác nhận hủy dịch vụ này?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="sessionId" th:value="${examSession.id}"/>
                        <button type="submit" class="btn btn-secondary btn-icon-danger" style="padding:4px 12px;">Hủy</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(registeredServices)}">
                <td colspan="9">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Chưa đăng ký dịch vụ nào cho phiên khám này.</p>
                    </div>
                </td>
            </tr>
            </tbody>
            <tfoot th:if="${!#lists.isEmpty(registeredServices)}">
            <tr>
                <td colspan="5" style="text-align:right;"><strong>Tổng cộng</strong></td>
                <td><strong th:text="${#numbers.formatDecimal(#aggregates.sum(registeredServices.![totalAmount]), 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong></td>
                <td colspan="3"></td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>

<script></script>

</th:block>
</body>
</html>
