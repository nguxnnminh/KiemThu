<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Hóa đơn', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Tiếp đón và khám bệnh / Hóa đơn</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Hóa đơn</h2>
            <p class="page-sub">Danh sách hóa đơn thanh toán dịch vụ.</p>
        </div>
    </div>

    <div class="card-stats" style="margin-bottom:var(--space-4);">
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${stats.total()}">0</div>
                <div class="card-stat-label">Tổng hóa đơn</div>
            </div>
        </div>
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${#numbers.formatDecimal(stats.totalPaid(), 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                <div class="card-stat-label">Đã thu</div>
            </div>
        </div>
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${#numbers.formatDecimal(stats.outstanding(), 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                <div class="card-stat-label">Còn phải thu</div>
            </div>
        </div>
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${stats.unpaid()}">0</div>
                <div class="card-stat-label">Chưa thanh toán</div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);">
        <form method="get" th:action="@{/clinical/invoices}" class="toolbar">
            <div class="filters">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã HĐ, tên, SĐT bệnh nhân..."
                       th:value="${keyword}" style="min-width:240px;"/>
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
                <input type="date" name="fromDate" class="form-control" th:value="${fromDate}" title="Từ ngày khám"/>
                <input type="date" name="toDate" class="form-control" th:value="${toDate}" title="Đến ngày khám"/>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/clinical/invoices}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã hóa đơn</th>
                <th>Bệnh nhân</th>
                <th>SĐT</th>
                <th>Ngày khám</th>
                <th>Tổng tiền</th>
                <th>Giảm giá</th>
                <th>Thành tiền</th>
                <th>Đã thu</th>
                <th>Còn lại</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="i : ${invoices.content}">
                <td th:text="${i.invoiceCode}"></td>
                <td th:text="${i.patient.fullName}"></td>
                <td th:text="${i.patient.phone}"></td>
                <td th:text="${#temporals.format(i.treatmentSession.examinationDate, 'dd/MM/yyyy')}"></td>
                <td th:text="${#numbers.formatDecimal(i.totalAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${#numbers.formatDecimal(i.discountAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td><strong th:text="${#numbers.formatDecimal(i.finalAmount, 0, 'COMMA', 0, 'POINT')}"></strong></td>
                <td th:text="${#numbers.formatDecimal(i.paidAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${#numbers.formatDecimal(i.remainingAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${i.remainingAmount.compareTo(T(java.math.BigDecimal).ZERO) == 0 and i.status.name() != 'CANCELLED'} ? 'badge-paid' : (${i.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-unpaid')"
                          th:text="${i.remainingAmount.compareTo(T(java.math.BigDecimal).ZERO) == 0 and i.status.name() != 'CANCELLED'} ? 'Đã thanh toán' : (${i.status.name() == 'CANCELLED'} ? 'Đã hủy' : 'Chưa thanh toán')"></span>
                </td>
                <td>
                    <a th:href="@{/clinical/invoices/{id}(id=${i.id})}" class="btn btn-secondary" style="padding:4px 12px;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        Chi tiết
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(invoices.content)}">
                <td colspan="11">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Không tìm thấy hóa đơn nào.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${invoices.totalPages > 1}">
        <a th:each="p : ${#numbers.sequence(0, invoices.totalPages - 1)}"
           th:href="@{/clinical/invoices(page=${p}, keyword=${keyword}, status=${statusFilter}, fromDate=${fromDate}, toDate=${toDate})}"
           th:text="${p + 1}"
           th:classappend="${p == invoices.number} ? 'active' : ''"></a>
    </div>
</div>

<script></script>

</th:block>
</body>
</html>
