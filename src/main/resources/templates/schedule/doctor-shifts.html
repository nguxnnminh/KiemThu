<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Lịch trực bác sĩ', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Quản lý lịch khám / Lịch trực bác sĩ</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Lịch trực bác sĩ</h2>
            <p class="page-sub">Đăng ký, duyệt và quản lý lịch trực của bác sĩ.</p>
        </div>
        <button type="button" class="btn btn-primary" data-modal-target="addRegistrationModal" data-modal-title="Đăng ký lịch trực">
            + Đăng ký lịch trực
        </button>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);">
        <form method="get" th:action="@{/schedule/doctor-shifts}" class="toolbar">
            <div class="filters">
                <select name="doctorId" class="form-control" th:if="${!isDoctor}">
                    <option value="">-- Tất cả bác sĩ --</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}"
                            th:selected="${doctorFilter == d.id}"></option>
                </select>
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
                <input type="hidden" name="weekStart" th:value="${weekStart}"/>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/schedule/doctor-shifts}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="week-nav">
        <a class="btn btn-secondary"
           th:href="@{/schedule/doctor-shifts(weekStart=${prevWeekStart}, doctorId=${doctorFilter}, status=${statusFilter})}">&laquo; Tuần trước</a>
        <span class="week-nav-label"
              th:text="|Tuần ${#temporals.format(weekStart, 'dd/MM/yyyy')} - ${#temporals.format(weekEnd, 'dd/MM/yyyy')}|"></span>
        <a class="btn btn-secondary"
           th:href="@{/schedule/doctor-shifts(weekStart=${nextWeekStart}, doctorId=${doctorFilter}, status=${statusFilter})}">Tuần sau &raquo;</a>
    </div>

    <div class="card grid-week-wrapper">
        <div class="grid-week">
            <div class="grid-week-header">
                <div></div>
                <div th:each="i : ${#numbers.sequence(0, 6)}"
                     th:text="${#temporals.format(weekStart.plusDays(i), 'EEEE dd/MM')}"></div>
            </div>
            <th:block th:each="hour : ${#numbers.sequence(7, 19)}">
                <div class="grid-time-col" th:text="${hour} + ':00'"></div>
                <div class="grid-day-col" th:each="i : ${#numbers.sequence(0, 6)}">
                    <th:block th:with="day=${weekStart.plusDays(i)}">
                        <div th:each="pos : ${eventsByDay.get(day)}"
                             th:if="${pos.event.startTime != null and pos.event.startTime.hour == hour}"
                             class="grid-event"
                             th:classappend="${pos.event.status.name() == 'APPROVED'} ? 'grid-event-approved' : (${pos.event.status.name() == 'REJECTED' or pos.event.status.name() == 'CANCELLED'} ? 'grid-event-rejected' : 'grid-event-pending')"
                             th:attr="data-modal-target='shiftDetailModal-' + ${pos.event.id}, data-modal-title='Lịch trực: ' + ${pos.event.registrationCode}"
                             th:style="|flex-basis:${100 / pos.columnCount}%;|">
                            <strong th:text="${pos.event.workShift != null ? (#temporals.format(pos.event.startTime, 'HH:mm') + '-' + #temporals.format(pos.event.endTime, 'HH:mm')) : '-'}"></strong>
                            <span th:text="${pos.event.doctor != null ? pos.event.doctor.fullName : '-'}"></span><br/>
                            <span th:text="${pos.event.room != null ? pos.event.room.name : '-'}"></span>
                            <div>
                                <span class="badge"
                                      th:classappend="${pos.event.status.name() == 'APPROVED'} ? 'badge-confirmed' : (${pos.event.status.name() == 'REJECTED' or pos.event.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending')"
                                      th:text="${pos.event.status.label}"></span>
                            </div>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </div>
    </div>

    <!-- ===================== Modal: Dang ky lich truc ===================== -->
    <template id="addRegistrationModal" data-modal-title="Đăng ký lịch trực">
        <form method="post" class="modal-form" th:action="@{/schedule/doctor-shifts}" th:object="${registrationForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group" th:if="${!isDoctor}">
                <label>Bác sĩ <span style="color:var(--error)">*</span></label>
                <select name="doctorId" class="form-control" required>
                    <option value="">-- Chọn bác sĩ --</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}"
                            th:selected="*{doctorId} == ${d.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Ca làm việc <span style="color:var(--error)">*</span></label>
                <select name="workShiftId" class="form-control" data-shift-select required>
                    <option value="">-- Chọn ca --</option>
                    <option th:each="ws : ${workShifts}" th:value="${ws.id}"
                            th:text="${ws.name + ' (' + #temporals.format(ws.startTime,'HH:mm') + ' - ' + #temporals.format(ws.endTime,'HH:mm') + ') - ' + ws.dayType.label}"
                            th:attr="data-day-type=${ws.dayType}"
                            th:selected="*{workShiftId} == ${ws.id}"></option>
                </select>
                <small class="text-muted">Ca ngày thường chỉ áp dụng Thứ 2 - Thứ 6; ca cuối tuần chỉ áp dụng Thứ 7 - Chủ nhật. Danh sách ca tự lọc theo ngày trực đã chọn.</small>
            </div>
            <div class="form-group">
                <label>Ngày trực <span style="color:var(--error)">*</span></label>
                <input type="date" name="workDate" class="form-control" data-appointment-date th:value="*{workDate}" required/>
            </div>
            <div class="form-group">
                <label>Phòng</label>
                <select name="roomId" class="form-control" data-chair-room-select>
                    <option value="">-- Chưa xác định --</option>
                    <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.name}"
                            th:selected="*{roomId} == ${r.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Ghế</label>
                <select name="chairId" class="form-control" data-chair-select>
                    <option value="">-- Chưa xác định --</option>
                    <option th:each="c : ${chairs}" th:value="${c.id}" th:text="${c.name}"
                            th:attr="data-room-id=${c.room.id}"
                            th:selected="*{chairId} == ${c.id}"></option>
                </select>
                <small class="text-muted">Danh sách ghế sẽ lọc theo phòng đã chọn.</small>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea name="note" class="form-control" th:text="*{note}"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Đăng ký</button>
            </div>
        </form>
    </template>

    <!-- ===================== Modal: Chi tiet lich truc ===================== -->
    <th:block th:each="day : ${eventsByDay.keySet()}">
        <template th:each="pos : ${eventsByDay.get(day)}"
                  th:with="reg=${pos.event}"
                  th:id="'shiftDetailModal-' + ${reg.id}"
                  th:data-modal-title="'Lịch trực: ' + ${reg.registrationCode}">
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <p>Bác sĩ: <strong th:text="${reg.doctor.fullName}"></strong></p>
            <p>Ca làm việc: <strong th:text="${reg.workShift.name + ' (' + #temporals.format(reg.workShift.startTime,'HH:mm') + ' - ' + #temporals.format(reg.workShift.endTime,'HH:mm') + ')'}"></strong></p>
            <p>Ngày áp dụng: <span th:text="${reg.workShift.dayType.label}"></span></p>
            <p>Ngày trực: <strong th:text="${#temporals.format(reg.workDate, 'dd/MM/yyyy')}"></strong></p>
            <p>Phòng: <span th:text="${reg.room != null ? reg.room.name : '-'}"></span></p>
            <p>Ghế: <span th:text="${reg.chair != null ? reg.chair.name : '-'}"></span></p>
            <p>Trạng thái:
                <span class="badge"
                      th:classappend="${reg.status.name() == 'APPROVED'} ? 'badge-confirmed' : (${reg.status.name() == 'REJECTED' or reg.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending')"
                      th:text="${reg.status.label}"></span>
            </p>
            <p>Ghi chú: <span th:text="${reg.note} ?: '-'"></span></p>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Đóng</button>
                <button th:if="${reg.status.name() == 'REGISTERED'}" type="button" class="btn btn-danger"
                        th:attr="data-confirm-form='cancelRegForm-' + ${reg.id}, data-confirm-title='Hủy đăng ký lịch trực', data-confirm-message='Bạn có chắc chắn muốn hủy đăng ký lịch trực này?'">
                    Hủy đăng ký
                </button>
                <th:block sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <button th:if="${reg.status.name() == 'REGISTERED'}" type="button" class="btn btn-primary"
                            th:attr="data-confirm-form='approveRegForm-' + ${reg.id}, data-confirm-title='Duyệt lịch trực', data-confirm-message='Bạn có chắc chắn muốn duyệt lịch trực này?'">
                        Duyệt
                    </button>
                    <button th:if="${reg.status.name() == 'REGISTERED'}" type="button" class="btn btn-danger"
                            th:attr="data-modal-target='rejectRegistrationModal-' + ${reg.id}, data-modal-title='Từ chối lịch trực'">
                        Từ chối
                    </button>
                </th:block>
            </div>

            <form th:id="'cancelRegForm-' + ${reg.id}" method="post"
                  th:action="@{/schedule/doctor-shifts/{id}/cancel(id=${reg.id})}" style="display:none">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
            <form th:id="'approveRegForm-' + ${reg.id}" method="post"
                  th:action="@{/schedule/doctor-shifts/{id}/approve(id=${reg.id})}" style="display:none">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </template>
    </th:block>

    <!-- ===================== Modal: Tu choi lich truc ===================== -->
    <th:block th:each="day : ${eventsByDay.keySet()}">
        <template th:each="pos : ${eventsByDay.get(day)}"
                  th:if="${pos.event.status.name() == 'REGISTERED'}"
                  th:with="reg=${pos.event}"
                  th:id="'rejectRegistrationModal-' + ${pos.event.id}"
                  th:data-modal-title="'Từ chối lịch trực: ' + ${pos.event.doctor.fullName}">
            <form method="post" class="modal-form" th:action="@{/schedule/doctor-shifts/{id}/reject(id=${reg.id})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                <p>Bạn có chắc chắn muốn từ chối lịch trực của <strong th:text="${reg.doctor.fullName}"></strong>
                   vào ngày <strong th:text="${#temporals.format(reg.workDate, 'dd/MM/yyyy')}"></strong> không?</p>
                <div class="form-group">
                    <label>Lý do từ chối <span style="color:var(--error)">*</span></label>
                    <textarea name="reason" class="form-control" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                    <button type="submit" class="btn btn-danger">Xác nhận từ chối</button>
                </div>
            </form>
        </template>
    </th:block>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
