<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Theo dõi lịch khám', ~{::#content}, ~{::script})}">

<div id="content" class="page-shell module-schedule page-appointment-track">
    <div class="breadcrumb">Quản lý lịch khám / Theo dõi lịch khám</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <h2>Theo dõi lịch khám</h2>
        <p class="page-sub">Theo dõi trạng thái các lịch hẹn khám.</p>
    </div>

    <div class="card filter-card mb-4">
        <form method="get" th:action="@{/schedule/appointments/track}" class="toolbar">
            <div class="filters">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã, tên bệnh nhân..."
                       th:value="${keyword}" style="min-width:200px;"/>
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
                <input type="hidden" name="weekStart" th:value="${weekStart}"/>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/schedule/appointments/track}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="week-nav">
        <a class="btn btn-secondary"
           th:href="@{/schedule/appointments/track(weekStart=${prevWeekStart}, keyword=${keyword}, status=${statusFilter})}">&laquo; Tuần trước</a>
        <span class="week-nav-label"
              th:text="|Tuần ${#temporals.format(weekStart, 'dd/MM/yyyy')} - ${#temporals.format(weekEnd, 'dd/MM/yyyy')}|"></span>
        <a class="btn btn-secondary"
           th:href="@{/schedule/appointments/track(weekStart=${nextWeekStart}, keyword=${keyword}, status=${statusFilter})}">Tuần sau &raquo;</a>
    </div>

    <div class="card grid-week-wrapper">
        <div class="grid-week">
            <div class="grid-week-header">
                <div></div>
                <div th:each="i : ${#numbers.sequence(0, 6)}"
                     th:text="${#temporals.format(weekStart.plusDays(i), 'EEEE dd/MM')}"></div>
            </div>
            <th:block th:each="hour : ${#numbers.sequence(7, 19)}">
                <div class="grid-time-col" th:text="${hour} + ':00'"></div>
                <div class="grid-day-col" th:each="i : ${#numbers.sequence(0, 6)}">
                    <th:block th:with="day=${weekStart.plusDays(i)}">
                        <div th:each="pos : ${eventsByDay.get(day)}"
                             th:if="${pos.event.startTime.hour == hour}"
                             class="grid-event"
                             th:classappend="${pos.event.status.name() == 'COMPLETED'} ? 'grid-event-completed' : (${pos.event.status.name() == 'CANCELLED' or pos.event.status.name() == 'NO_SHOW'} ? 'grid-event-cancelled' : (${pos.event.status.name() == 'CONFIRMED'} ? 'grid-event-confirmed' : 'grid-event-pending'))"
                             th:attr="data-modal-target=${isDoctor and pos.event.status.name() != 'COMPLETED' and pos.event.status.name() != 'CANCELLED' and pos.event.status.name() != 'NO_SHOW'} ? ('trackStatusModal-' + ${pos.event.id}) : null, data-modal-title='Cập nhật trạng thái: ' + ${pos.event.appointmentCode}"
                             th:style="|flex-basis:${100 / pos.columnCount}%;|">
                            <strong th:text="${#temporals.format(pos.event.startTime, 'HH:mm') + '-' + #temporals.format(pos.event.endTime, 'HH:mm')}"></strong>
                            <span th:text="${pos.event.patient != null ? pos.event.patient.fullName : '-'}"></span><br/>
                            <span th:text="${pos.event.doctor != null ? pos.event.doctor.fullName : '-'}"></span>
                            <div>
                                <span class="badge"
                                      th:classappend="${pos.event.status.name() == 'COMPLETED'} ? 'badge-completed' : (${pos.event.status.name() == 'CANCELLED' or pos.event.status.name() == 'NO_SHOW'} ? 'badge-cancelled' : (${pos.event.status.name() == 'CONFIRMED'} ? 'badge-confirmed' : 'badge-pending'))"
                                      th:text="${pos.event.status.label}"></span>
                            </div>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </div>
    </div>

    <!-- ===================== Modal: Cap nhat trang thai (bac si) ===================== -->
    <th:block th:each="day : ${eventsByDay.keySet()}">
        <template th:each="pos : ${eventsByDay.get(day)}"
                  th:if="${isDoctor and pos.event.status.name() != 'COMPLETED' and pos.event.status.name() != 'CANCELLED' and pos.event.status.name() != 'NO_SHOW'}"
                  th:with="a=${pos.event}"
                  th:id="'trackStatusModal-' + ${pos.event.id}"
                  th:data-modal-title="'Cập nhật trạng thái: ' + ${pos.event.appointmentCode}">
            <form method="post" class="modal-form form-section" th:action="@{/schedule/appointments/{id}/track-status(id=${a.id})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <div class="form-group">
                    <label>Trạng thái hiện tại</label>
                    <input type="text" class="form-control" th:value="${a.status.label}" disabled/>
                </div>
                <div class="form-group">
                    <label>Trạng thái mới <span class="req">*</span></label>
                    <select name="status" class="form-control" required>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ghi chú</label>
                    <textarea name="note" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label>Lý do hủy (bắt buộc nếu chọn "Đã hủy")</label>
                    <textarea name="cancelReason" class="form-control"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                    <button type="submit" class="btn btn-primary">Cập nhật</button>
                </div>
            </form>
        </template>
    </th:block>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
