<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Quản lý ca làm việc', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Quản lý lịch khám / Ca làm việc</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Quản lý ca làm việc <span class="count-chip" th:text="${workShifts.totalElements} + ' ca'">0</span></h2>
            <p class="page-sub">Khai báo các ca làm việc chuẩn của phòng khám.</p>
        </div>
        <button type="button" class="btn btn-primary" data-modal-target="addWorkShiftModal" data-modal-title="Thêm ca làm việc">
            + Thêm ca làm việc
        </button>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);">
        <form method="get" th:action="@{/schedule/work-shifts}" class="toolbar">
            <div class="filters">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã, tên ca..."
                       th:value="${keyword}" style="min-width:220px;"/>
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
                <select name="dayType" class="form-control">
                    <option value="">-- Tất cả ngày áp dụng --</option>
                    <option th:each="d : ${dayTypes}" th:value="${d}" th:text="${d.label}"
                            th:selected="${dayTypeFilter == d}"></option>
                </select>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/schedule/work-shifts}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã ca</th>
                <th>Tên ca</th>
                <th>Áp dụng</th>
                <th>Giờ bắt đầu</th>
                <th>Giờ kết thúc</th>
                <th>Mô tả</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ws : ${workShifts.content}">
                <td th:text="${ws.shiftCode}"></td>
                <td th:text="${ws.name}"></td>
                <td><span class="badge badge-info" th:text="${ws.dayType.label}"></span></td>
                <td>
                    <span class="badge badge-info" th:text="${#temporals.format(ws.startTime, 'HH:mm')}"></span>
                </td>
                <td>
                    <span class="badge badge-info" th:text="${#temporals.format(ws.endTime, 'HH:mm')}"></span>
                </td>
                <td th:text="${ws.description} ?: '-'"></td>
                <td>
                    <span class="badge"
                          th:classappend="${ws.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                          th:text="${ws.status.label}"></span>
                </td>
                <td>
                    <div class="action-buttons">
                        <button type="button" class="btn-icon" title="Sửa ca làm việc"
                                th:attr="data-modal-target='editWorkShiftModal-' + ${ws.id}, data-modal-title='Sửa ca làm việc: ' + ${ws.name}">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>

                        <button th:if="${ws.status.name() == 'ACTIVE'}" type="button" class="btn-icon btn-icon-danger" title="Ngừng sử dụng"
                                th:attr="data-confirm-form='deactivateWorkShiftForm-' + ${ws.id}, data-confirm-title='Ngừng sử dụng ca làm việc', data-confirm-message='Bạn có chắc chắn muốn ngừng sử dụng ca ' + ${ws.name} + '?'">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        </button>
                        <form th:id="'deactivateWorkShiftForm-' + ${ws.id}" method="post"
                              th:action="@{/schedule/work-shifts/{id}/deactivate(id=${ws.id})}" style="display:none">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>

                        <button th:if="${ws.status.name() != 'ACTIVE'}" type="button" class="btn-icon" title="Kích hoạt lại"
                                th:attr="data-confirm-form='activateWorkShiftForm-' + ${ws.id}, data-confirm-title='Kích hoạt lại ca làm việc', data-confirm-message='Bạn có chắc chắn muốn kích hoạt lại ca ' + ${ws.name} + '?'">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                        <form th:id="'activateWorkShiftForm-' + ${ws.id}" method="post"
                              th:action="@{/schedule/work-shifts/{id}/activate(id=${ws.id})}" style="display:none">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${workShifts.empty}">
                <td colspan="8">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Không tìm thấy ca làm việc nào phù hợp.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${workShifts.totalPages > 1}">
        <a th:each="p : ${#numbers.sequence(0, workShifts.totalPages - 1)}"
           th:href="@{/schedule/work-shifts(page=${p}, keyword=${keyword}, status=${statusFilter}, dayType=${dayTypeFilter})}"
           th:text="${p + 1}"
           th:classappend="${p == workShifts.number} ? 'active' : ''"></a>
    </div>

    <!-- ===================== Modal: Them ca lam viec ===================== -->
    <template id="addWorkShiftModal" data-modal-title="Thêm ca làm việc">
        <form method="post" class="modal-form" th:action="@{/schedule/work-shifts}" th:object="${workShiftForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Tên ca <span style="color:var(--error)">*</span></label>
                <input type="text" name="name" class="form-control" th:value="*{name}" required/>
            </div>
            <div class="form-group">
                <label>Giờ bắt đầu <span style="color:var(--error)">*</span></label>
                <input type="time" name="startTime" class="form-control" th:value="*{startTime}" required/>
            </div>
            <div class="form-group">
                <label>Giờ kết thúc <span style="color:var(--error)">*</span></label>
                <input type="time" name="endTime" class="form-control" th:value="*{endTime}" required/>
            </div>
            <div class="form-group">
                <label>Ngày áp dụng</label>
                <select name="dayType" class="form-control">
                    <option th:each="d : ${dayTypes}" th:value="${d}" th:text="${d.label}"
                            th:selected="*{dayType} == ${d}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="*{description}"></textarea>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="*{status} == ${s}"></option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>

    <!-- ===================== Modal: Sua ca lam viec ===================== -->
    <template th:each="ws : ${workShifts.content}" th:id="'editWorkShiftModal-' + ${ws.id}"
              th:data-modal-title="'Sửa ca làm việc: ' + ${ws.name}"
              th:with="ef=${editForms.get('editWorkShiftForm-' + ws.id)}">
        <form method="post" class="modal-form" th:action="@{/schedule/work-shifts/{id}(id=${ws.id})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Mã ca</label>
                <input type="text" class="form-control" th:value="${ws.shiftCode}" disabled/>
            </div>
            <div class="form-group">
                <label>Tên ca <span style="color:var(--error)">*</span></label>
                <input type="text" name="name" class="form-control"
                       th:value="${ef != null ? ef.name : ws.name}" required/>
            </div>
            <div class="form-group">
                <label>Giờ bắt đầu <span style="color:var(--error)">*</span></label>
                <input type="time" name="startTime" class="form-control"
                       th:value="${ef != null ? ef.startTime : ws.startTime}" required/>
            </div>
            <div class="form-group">
                <label>Giờ kết thúc <span style="color:var(--error)">*</span></label>
                <input type="time" name="endTime" class="form-control"
                       th:value="${ef != null ? ef.endTime : ws.endTime}" required/>
            </div>
            <div class="form-group">
                <label>Ngày áp dụng</label>
                <select name="dayType" class="form-control">
                    <option th:each="d : ${dayTypes}" th:value="${d}" th:text="${d.label}"
                            th:selected="${(ef != null ? ef.dayType : ws.dayType) == d}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control"
                          th:text="${ef != null ? ef.description : ws.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${(ef != null ? ef.status : ws.status) == s}"></option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
