<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Quản lý dịch vụ', ~{::#content}, ~{::script})}">

<div id="content" class="page-shell module-system page-services">
    <div class="breadcrumb">Quản lý hệ thống / Quản lý danh mục dịch vụ</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Quản lý danh mục dịch vụ</h2>
            <p class="page-sub">Quản lý nhóm dịch vụ và các dịch vụ nha khoa.</p>
        </div>
        <div style="display:flex; gap:var(--space-2); flex-wrap:wrap;">
            <button type="button" class="btn btn-secondary" data-modal-target="manageCategoriesModal" data-modal-title="Quản lý nhóm dịch vụ">
                Quản lý nhóm dịch vụ
            </button>
            <button type="button" class="btn btn-primary" data-modal-target="addServiceModal" data-modal-title="Thêm dịch vụ">
                + Thêm dịch vụ
            </button>
        </div>
    </div>

    <div class="card-stats mb-4">
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${stats.total()}">0</div>
                <div class="card-stat-label">Tổng dịch vụ</div>
            </div>
        </div>
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${stats.active()}">0</div>
                <div class="card-stat-label">Đang cung cấp</div>
            </div>
        </div>
        <div class="card-stat">
            <div class="card-stat-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
            <div>
                <div class="card-stat-value" th:text="${stats.categories()}">0</div>
                <div class="card-stat-label">Nhóm dịch vụ</div>
            </div>
        </div>
    </div>

    <div class="card filter-card mb-4">
        <form method="get" th:action="@{/system/services}" class="toolbar">
            <div class="filters">
                <input type="text" name="keyword" class="form-control col-min-220" placeholder="Tìm theo tên, mã dịch vụ..."
                       th:value="${keyword}"/>
                <select name="categoryId" class="form-control">
                    <option value="">-- Tất cả nhóm dịch vụ --</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${categoryFilter == c.id}"></option>
                </select>
                <select name="unit" class="form-control">
                    <option value="">-- Tất cả đơn vị tính --</option>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u.label}"
                            th:selected="${unitFilter == u}"></option>
                </select>
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/system/services}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="card table-card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã dịch vụ</th>
                <th>Tên dịch vụ</th>
                <th>Nhóm dịch vụ</th>
                <th>Đơn vị tính</th>
                <th>Thời gian (phút)</th>
                <th>Mô tả</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="svc : ${services.content}">
                <td th:text="${svc.serviceCode}"></td>
                <td th:text="${svc.name}"></td>
                <td>
                    <span class="color-dot" th:if="${svc.category.colorHex}" th:style="'background-color:' + ${svc.category.colorHex}"></span>
                    <span th:text="${svc.category.name}"></span>
                </td>
                <td th:text="${svc.unit.label}"></td>
                <td th:text="${svc.durationMinutes}"></td>
                <td th:text="${svc.description} ?: '-'"></td>
                <td>
                    <span class="badge" th:classappend="${svc.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                          th:text="${svc.status.label}"></span>
                </td>
                <td>
                    <div class="action-buttons">
                        <button type="button" class="btn-icon" title="Sửa dịch vụ"
                                th:attr="data-modal-target='editServiceModal-' + ${svc.id}, data-modal-title='Sửa dịch vụ: ' + ${svc.name}">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr th:if="${services.empty}">
                <td colspan="8">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Không tìm thấy dịch vụ nào phù hợp.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${services.totalPages > 1}">
        <a th:each="p : ${#numbers.sequence(0, services.totalPages - 1)}"
           th:href="@{/system/services(page=${p}, keyword=${keyword}, categoryId=${categoryFilter}, unit=${unitFilter}, status=${statusFilter})}"
           th:text="${p + 1}"
           th:classappend="${p == services.number} ? 'active' : ''"></a>
    </div>

    <!-- ===================== Modal: Them dich vu ===================== -->
    <template id="addServiceModal" data-modal-title="Thêm dịch vụ">
        <form method="post" class="modal-form form-section" th:action="@{/system/services}" th:object="${serviceForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Tên dịch vụ <span class="req">*</span></label>
                <input type="text" name="name" class="form-control" th:value="*{name}" required/>
            </div>
            <div class="form-group">
                <label>Nhóm dịch vụ <span class="req">*</span></label>
                <select name="categoryId" class="form-control" required>
                    <option value="">-- Chọn nhóm dịch vụ --</option>
                    <option th:each="c : ${activeCategories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="*{categoryId} == ${c.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Đơn vị tính <span class="req">*</span></label>
                <select name="unit" class="form-control" required>
                    <option value="">-- Chọn đơn vị tính --</option>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u.label}"
                            th:selected="*{unit} == ${u}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Thời gian thực hiện (phút) <span class="req">*</span></label>
                <input type="number" name="durationMinutes" class="form-control" min="5" max="480" th:value="*{durationMinutes}" required/>
                <small class="text-muted">Từ 5 đến 480 phút.</small>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="*{description}"></textarea>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="*{status} == ${s}"></option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>

    <!-- ===================== Modal: Sua dich vu (theo tung dong) ===================== -->
    <template th:each="svc : ${services.content}" th:id="'editServiceModal-' + ${svc.id}"
              th:data-modal-title="'Sửa dịch vụ: ' + ${svc.name}"
              th:with="ef=${editForms.get('editServiceForm-' + svc.id)}">
        <form method="post" class="modal-form form-section" th:action="@{/system/services/{id}(id=${svc.id})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Mã dịch vụ</label>
                <input type="text" class="form-control" th:value="${svc.serviceCode}" disabled/>
            </div>
            <div class="form-group">
                <label>Tên dịch vụ <span class="req">*</span></label>
                <input type="text" name="name" class="form-control"
                       th:value="${ef != null ? ef.name : svc.name}" required/>
            </div>
            <div class="form-group">
                <label>Nhóm dịch vụ <span class="req">*</span></label>
                <select name="categoryId" class="form-control" required>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${(ef != null ? ef.categoryId : svc.category.id) == c.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Đơn vị tính <span class="req">*</span></label>
                <select name="unit" class="form-control" required>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u.label}"
                            th:selected="${(ef != null ? ef.unit : svc.unit) == u}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Thời gian thực hiện (phút) <span class="req">*</span></label>
                <input type="number" name="durationMinutes" class="form-control" min="5" max="480"
                       th:value="${ef != null ? ef.durationMinutes : svc.durationMinutes}" required/>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="${ef != null ? ef.description : svc.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${(ef != null ? ef.status : svc.status) == s}"></option>
                </select>
                <small class="text-muted">Ngừng cung cấp dịch vụ sẽ không cho phép chọn dịch vụ này khi lập hóa đơn.</small>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>

    <!-- ===================== Modal: Quan ly nhom dich vu ===================== -->
    <template id="manageCategoriesModal" data-modal-title="Quản lý nhóm dịch vụ">
        <div>
            <div style="display:flex; justify-content:flex-end; margin-bottom:var(--space-3);">
                <button type="button" class="btn btn-primary btn-sm" data-modal-target="categoryModal" data-modal-title="Thêm nhóm dịch vụ">
                    + Thêm nhóm dịch vụ
                </button>
            </div>
            <table class="data-table">
                <thead>
                <tr>
                    <th>Mã nhóm</th>
                    <th>Tên nhóm</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.categoryCode}"></td>
                    <td>
                        <span class="color-dot" th:if="${c.colorHex}" th:style="'background-color:' + ${c.colorHex}"></span>
                        <span th:text="${c.name}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${c.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                              th:text="${c.status.label}"></span>
                    </td>
                    <td>
                        <button type="button" class="btn-icon" title="Sửa nhóm dịch vụ"
                                th:attr="data-modal-target='editCategoryModal-' + ${c.id}, data-modal-title='Sửa nhóm dịch vụ: ' + ${c.name}">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                    </td>
                </tr>
                <tr th:if="${categories.empty}">
                    <td colspan="4">
                        <div class="empty-state">Chưa có nhóm dịch vụ nào.</div>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Đóng</button>
            </div>
        </div>
    </template>

    <!-- ===================== Modal: Them nhom dich vu ===================== -->
    <template id="categoryModal" data-modal-title="Thêm nhóm dịch vụ">
        <form method="post" class="modal-form form-section" th:action="@{/system/service-categories}" th:object="${categoryForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Tên nhóm dịch vụ <span class="req">*</span></label>
                <input type="text" name="name" class="form-control" th:value="*{name}" required/>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="*{description}"></textarea>
            </div>
            <div class="form-group">
                <label>Màu hiển thị</label>
                <input type="color" name="colorHex" class="form-control" th:value="*{colorHex} ?: '#2563eb'" style="height:40px;"/>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="*{status} == ${s}"></option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>

    <!-- ===================== Modal: Sua nhom dich vu (theo tung dong) ===================== -->
    <template th:each="c : ${categories}" th:id="'editCategoryModal-' + ${c.id}"
              th:data-modal-title="'Sửa nhóm dịch vụ: ' + ${c.name}"
              th:with="ef=${editForms.get('editCategoryForm-' + c.id)}">
        <form method="post" class="modal-form form-section" th:action="@{/system/service-categories/{id}(id=${c.id})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Mã nhóm dịch vụ</label>
                <input type="text" class="form-control" th:value="${c.categoryCode}" disabled/>
            </div>
            <div class="form-group">
                <label>Tên nhóm dịch vụ <span class="req">*</span></label>
                <input type="text" name="name" class="form-control"
                       th:value="${ef != null ? ef.name : c.name}" required/>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="${ef != null ? ef.description : c.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Màu hiển thị</label>
                <input type="color" name="colorHex" class="form-control"
                       th:value="${(ef != null ? ef.colorHex : c.colorHex) ?: '#2563eb'}" style="height:40px;"/>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${(ef != null ? ef.status : c.status) == s}"></option>
                </select>
                <small class="text-muted">Không thể ngừng hoạt động nếu nhóm còn dịch vụ đang hoạt động.</small>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    var reopenModal2 = /*[[${reopenModal2}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    if (reopenModal2) {
        window.__reopenModal2 = reopenModal2;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
