<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" class="topbar">
    <div class="topbar-left">
        <button id="sidebarToggle" class="icon-btn" type="button" aria-label="Thu gọn menu">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <a href="/dashboard" class="brand">
            <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
                <rect width="32" height="32" rx="6" fill="#0d9488"/>
                <path d="M16 6c-3.5 0-6 2.2-6 5.5 0 2 .8 3.2 1.4 4.6.6 1.4 1.1 3 1.3 6.4.05.9.7 1.5 1.5 1.5s1.4-.6 1.5-1.5c.2-3 .5-3.6.9-3.6s.7.6.9 3.6c.05.9.7 1.5 1.5 1.5s1.45-.6 1.5-1.5c.2-3.4.7-5 1.3-6.4.6-1.4 1.4-2.6 1.4-4.6 0-3.3-2.5-5.5-6-5.5z" fill="#ffffff"/>
            </svg>
            <span class="brand-text">
                <span class="brand-name">Smart Dental</span>
                <span class="brand-sub">Quản lý phòng khám</span>
            </span>
        </a>
        <span class="page-title-current" th:if="${pageTitle}" th:text="${pageTitle}">Trang hiện tại</span>
    </div>

    <div class="topbar-right">
        <div class="topbar-search">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Tìm kiếm nhanh..." aria-label="Tìm kiếm"/>
        </div>

        <div class="topbar-user-chip">
            <span class="topbar-user-ava" th:text="${#strings.toUpperCase(#strings.substring(#authentication.name + ' ', 0, 1))}" sec:authorize="isAuthenticated()">U</span>
            <span class="topbar-user-meta">
                <span class="topbar-user-name" sec:authentication="name">username</span>
                <span class="role-badge"
                      th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">ROLE</span>
            </span>
        </div>

        <a href="/account/profile" class="icon-btn" title="Tài khoản" aria-label="Tài khoản">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.66V19a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v1.66"/>
            </svg>
        </a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="icon-btn icon-btn-danger" title="Đăng xuất" aria-label="Đăng xuất">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </form>
    </div>
</header>
</body>
</html>
