<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Modal dung chung: them/sua/xac nhan. Noi dung form se duoc JS bom vao #appModalBody -->
<div th:fragment="modal" id="appModalOverlay" class="modal-overlay app-modal-overlay">
    <div id="appModal" class="modal-box" role="dialog" aria-modal="true">
        <div class="modal-header">
            <h3 id="appModalTitle">Tieu de</h3>
            <button type="button" class="modal-close" id="appModalClose" aria-label="Dong">&times;</button>
        </div>
        <div class="modal-body" id="appModalBody">
            <!-- Noi dung form duoc chen vao day -->
        </div>
    </div>
</div>

<!-- Khung thong bao loi/thanh cong dung chung -->
<div th:fragment="alerts" class="alert-area">
    <div th:if="${successMessage}" class="alert alert-success app-alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error app-alert" th:text="${errorMessage}"></div>
</div>

</body>
</html>
