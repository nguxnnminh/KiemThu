<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Layout chinh dung chung cho toan he thong.
  Cach dung tai 1 trang content:

  <th:block th:replace="~{layout/main :: layout('Tieu de trang', ~{::#content}, ~{})}">
    <div id="content"> ... noi dung ... </div>
  </th:block>
-->
<th:block th:fragment="layout(title, content, pageScript)">
    <!DOCTYPE html>
    <html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title th:text="${title} + ' - Smart Dental'">Smart Dental</title>
        <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
        <link rel="stylesheet" th:href="@{/css/app.css}"/>
    </head>
    <body>
        <div th:replace="~{layout/header :: header}" th:with="pageTitle=${title}"></div>
        <div class="app-container">
            <div th:replace="~{layout/sidebar :: sidebar}"></div>
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            <main class="content">
                <div th:replace="${content}"></div>
            </main>
        </div>
        <div th:replace="~{layout/fragments :: modal}"></div>
        <script th:src="@{/js/app.js}"></script>
        <script th:src="@{/js/modal.js}"></script>
        <script th:src="@{/js/schedule.js}"></script>
        <th:block th:replace="${pageScript}"></th:block>
    </body>
    </html>
</th:block>

</body>
</html>
