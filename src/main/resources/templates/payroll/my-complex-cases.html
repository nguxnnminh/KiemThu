<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Hệ số ca phức tạp của tôi', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Tính lương bác sĩ / Hệ số ca phức tạp của tôi</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Hệ số ca phức tạp của tôi <span class="count-chip" th:text="${#lists.size(coefficients)} + ' đề xuất'">0</span></h2>
            <p class="page-sub">Đề xuất hệ số ca phức tạp cho các phiên điều trị đã hoàn thành.</p>
        </div>
        <button type="button" class="btn btn-primary" data-modal-target="proposeCcModal" data-modal-title="Đề xuất hệ số ca phức tạp">
            + Đề xuất hệ số
        </button>
    </div>

    <div class="card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Mã phiên điều trị</th>
                <th>Ngày khám</th>
                <th>Hệ số</th>
                <th>Lý do</th>
                <th>Trạng thái</th>
                <th>Lý do từ chối</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${coefficients}">
                <td th:text="${c.coefficientCode}"></td>
                <td th:text="${c.treatmentSession.sessionCode}"></td>
                <td th:text="${#temporals.format(c.treatmentSession.examinationDate, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.coefficient}"></td>
                <td th:text="${c.reason} ?: '-'"></td>
                <td>
                    <span class="badge"
                          th:classappend="${c.status.name() == 'APPROVED'} ? 'badge-active' : (${c.status.name() == 'REJECTED'} ? 'badge-cancelled' : 'badge-pending')"
                          th:text="${c.status.label}"></span>
                </td>
                <td th:text="${c.rejectReason} ?: '-'"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(coefficients)}">
                <td colspan="7">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Bạn chưa đề xuất hệ số ca phức tạp nào.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ===================== Modal: De xuat he so ca phuc tap ===================== -->
    <template id="proposeCcModal" data-modal-title="Đề xuất hệ số ca phức tạp">
        <form method="post" class="modal-form" th:action="@{/payroll/complex-cases/my}" th:object="${proposeForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Phiên điều trị đã hoàn thành <span style="color:var(--error)">*</span></label>
                <select name="treatmentSessionId" class="form-control" required>
                    <option value="">-- Chọn phiên điều trị --</option>
                    <option th:each="s : ${completedSessions}" th:value="${s.id}"
                            th:text="|${s.sessionCode} - ${#temporals.format(s.examinationDate, 'dd/MM/yyyy')} - ${s.patient.fullName}|"
                            th:selected="*{treatmentSessionId} == ${s.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Hệ số (0.1 - 0.5) <span style="color:var(--error)">*</span></label>
                <input type="number" step="0.01" min="0.1" max="0.5" name="coefficient" class="form-control" th:value="*{coefficient}" required/>
            </div>
            <div class="form-group">
                <label>Lý do <span style="color:var(--error)">*</span></label>
                <textarea name="reason" class="form-control" required th:text="*{reason}"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Đề xuất</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
