<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Hệ số ca phức tạp', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Tính lương bác sĩ / Hệ số ca phức tạp</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Hệ số ca phức tạp trong tháng <span class="count-chip" th:text="${coefficients.totalElements} + ' đề xuất'">0</span></h2>
            <p class="page-sub">Duyệt hệ số ca phức tạp do bác sĩ đề xuất cho các phiên điều trị.</p>
        </div>
    </div>

    <div class="card" style="margin-bottom:var(--space-4);">
        <form method="get" th:action="@{/payroll/complex-cases}" class="toolbar">
            <div class="filters">
                <select name="status" class="form-control">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                            th:selected="${statusFilter == s}"></option>
                </select>
            </div>
            <div class="filters">
                <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
                <a th:href="@{/payroll/complex-cases}" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Bác sĩ</th>
                <th>Mã phiên điều trị</th>
                <th>Ngày khám</th>
                <th>Hệ số</th>
                <th>Lý do</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${coefficients.content}">
                <td th:text="${c.coefficientCode}"></td>
                <td th:text="${c.doctor.fullName}"></td>
                <td th:text="${c.treatmentSession.sessionCode}"></td>
                <td th:text="${#temporals.format(c.treatmentSession.examinationDate, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.coefficient}"></td>
                <td th:text="${c.reason} ?: '-'"></td>
                <td>
                    <span class="badge"
                          th:classappend="${c.status.name() == 'APPROVED'} ? 'badge-active' : (${c.status.name() == 'REJECTED'} ? 'badge-cancelled' : 'badge-pending')"
                          th:text="${c.status.label}"></span>
                </td>
                <td>
                    <div class="action-buttons" th:if="${c.status.name() == 'PENDING'}">
                        <button type="button" class="btn-icon" title="Duyệt"
                                th:attr="data-confirm-form='approveCcForm-' + ${c.id}, data-confirm-title='Duyệt hệ số ca phức tạp', data-confirm-message='Bạn có chắc chắn muốn duyệt hệ số ' + ${c.coefficientCode} + '?'">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        </button>
                        <form th:id="'approveCcForm-' + ${c.id}" method="post"
                              th:action="@{/payroll/complex-cases/{id}/approve(id=${c.id})}" style="display:none">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>

                        <button type="button" class="btn-icon btn-icon-danger" title="Từ chối"
                                th:attr="data-modal-target='rejectCcModal-' + ${c.id}, data-modal-title='Từ chối hệ số: ' + ${c.coefficientCode}">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        </button>
                    </div>
                    <span th:if="${c.status.name() != 'PENDING'}">-</span>
                </td>
            </tr>
            <tr th:if="${coefficients.empty}">
                <td colspan="8">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Không có hệ số ca phức tạp nào.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" th:if="${coefficients.totalPages > 1}">
        <a th:each="p : ${#numbers.sequence(0, coefficients.totalPages - 1)}"
           th:href="@{/payroll/complex-cases(page=${p}, status=${statusFilter})}"
           th:text="${p + 1}"
           th:classappend="${p == coefficients.number} ? 'active' : ''"></a>
    </div>

    <!-- ===================== Modal: Tu choi he so ===================== -->
    <template th:each="c : ${coefficients.content}" th:if="${c.status.name() == 'PENDING'}"
              th:id="'rejectCcModal-' + ${c.id}"
              th:data-modal-title="'Từ chối hệ số: ' + ${c.coefficientCode}">
        <form method="post" class="modal-form" th:action="@{/payroll/complex-cases/{id}/reject(id=${c.id})}" th:object="${decisionForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Lý do từ chối <span style="color:var(--error)">*</span></label>
                <textarea name="rejectReason" class="form-control" required th:text="*{rejectReason}"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-danger">Từ chối</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
