<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Mức tiền/giờ', ~{::#content}, ~{::script})}">

<div id="content" class="page-shell module-payroll page-hourly-rates">
    <div class="breadcrumb">Tính lương bác sĩ / Mức tiền/giờ</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Mức tiền cơ bản cho một giờ <span class="count-chip" th:text="${#lists.size(rates)} + ' mức'">0</span></h2>
            <p class="page-sub">Thiết lập mức tiền/giờ áp dụng để tính lương bác sĩ.</p>
        </div>
        <button type="button" class="btn btn-primary" data-modal-target="addHourlyRateModal" data-modal-title="Thêm mức tiền/giờ">
            + Thêm mức tiền/giờ
        </button>
    </div>

    <div class="card table-card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Mức tiền/giờ (VNĐ)</th>
                <th>Hiệu lực từ</th>
                <th>Hiệu lực đến</th>
                <th>Ghi chú</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rates}">
                <td th:text="${r.rateCode}"></td>
                <td th:text="${#numbers.formatDecimal(r.hourlyRate, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${#temporals.format(r.effectiveFrom, 'dd/MM/yyyy')}"></td>
                <td th:text="${r.effectiveTo != null ? #temporals.format(r.effectiveTo, 'dd/MM/yyyy') : '-'}"></td>
                <td th:text="${r.note} ?: '-'"></td>
                <td>
                    <span class="badge"
                          th:classappend="${r.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                          th:text="${r.status.label}"></span>
                </td>
                <td>
                    <div class="action-buttons">
                        <button th:if="${r.status.name() == 'ACTIVE'}" type="button" class="btn-icon btn-icon-danger" title="Hủy"
                                th:attr="data-confirm-form='cancelRateForm-' + ${r.id}, data-confirm-title='Hủy mức tiền/giờ', data-confirm-message='Bạn có chắc chắn muốn hủy mức tiền/giờ ' + ${r.rateCode} + '?'">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        </button>
                        <form th:id="'cancelRateForm-' + ${r.id}" method="post"
                              th:action="@{/payroll/hourly-rates/{id}/cancel(id=${r.id})}" style="display:none">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(rates)}">
                <td colspan="7">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Chưa có mức tiền/giờ nào được thiết lập.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ===================== Modal: Them muc tien/gio ===================== -->
    <template id="addHourlyRateModal" data-modal-title="Thêm mức tiền/giờ">
        <form method="post" class="modal-form form-section" th:action="@{/payroll/hourly-rates}" th:object="${rateForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Mức tiền/giờ (VNĐ) <span class="req">*</span></label>
                <input type="number" step="0.01" min="0" name="hourlyRate" class="form-control" th:value="*{hourlyRate}" required/>
            </div>
            <div class="form-group">
                <label>Hiệu lực từ <span class="req">*</span></label>
                <input type="date" name="effectiveFrom" class="form-control" th:value="*{effectiveFrom}" required/>
            </div>
            <div class="form-group">
                <label>Hiệu lực đến</label>
                <input type="date" name="effectiveTo" class="form-control" th:value="*{effectiveTo}"/>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea name="note" class="form-control" th:text="*{note}"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
