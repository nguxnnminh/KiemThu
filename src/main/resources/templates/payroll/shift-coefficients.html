<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{layout/main :: layout('Hệ số ca làm việc', ~{::#content}, ~{::script})}">

<div id="content">
    <div class="breadcrumb">Tính lương bác sĩ / Hệ số ca làm việc</div>

    <div th:replace="~{layout/fragments :: alerts}"></div>

    <div class="page-header">
        <div>
            <h2>Hệ số ca làm việc <span class="count-chip" th:text="${#lists.size(coefficients)} + ' hệ số'">0</span></h2>
            <p class="page-sub">Thiết lập hệ số nhân theo từng ca làm việc để tính lương.</p>
        </div>
        <button type="button" class="btn btn-primary" data-modal-target="addShiftCoefficientModal" data-modal-title="Thêm hệ số ca">
            + Thêm hệ số ca
        </button>
    </div>

    <div class="card table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Ca làm việc</th>
                <th>Thứ áp dụng</th>
                <th>Hệ số</th>
                <th>Hiệu lực từ</th>
                <th>Hiệu lực đến</th>
                <th>Ghi chú</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${coefficients}">
                <td th:text="${c.coefficientCode}"></td>
                <td th:text="${c.workShift.name}"></td>
                <td><span class="badge badge-info" th:text="${c.workShift.dayType.label}"></span></td>
                <td th:text="${c.coefficient}"></td>
                <td th:text="${#temporals.format(c.effectiveFrom, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.effectiveTo != null ? #temporals.format(c.effectiveTo, 'dd/MM/yyyy') : '-'}"></td>
                <td th:text="${c.note} ?: '-'"></td>
                <td>
                    <span class="badge"
                          th:classappend="${c.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                          th:text="${c.status.label}"></span>
                </td>
                <td>
                    <div class="action-buttons">
                        <button th:if="${c.status.name() == 'ACTIVE'}" type="button" class="btn-icon btn-icon-danger" title="Hủy"
                                th:attr="data-confirm-form='cancelCoefForm-' + ${c.id}, data-confirm-title='Hủy hệ số ca', data-confirm-message='Bạn có chắc chắn muốn hủy hệ số ca ' + ${c.coefficientCode} + '?'">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        </button>
                        <form th:id="'cancelCoefForm-' + ${c.id}" method="post"
                              th:action="@{/payroll/shift-coefficients/{id}/cancel(id=${c.id})}" style="display:none">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(coefficients)}">
                <td colspan="9">
                    <div class="empty-state">
                        <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <p>Chưa có hệ số ca nào được thiết lập.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ===================== Modal: Them he so ca ===================== -->
    <template id="addShiftCoefficientModal" data-modal-title="Thêm hệ số ca">
        <form method="post" class="modal-form" th:action="@{/payroll/shift-coefficients}" th:object="${coefficientForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="form-group">
                <label>Ca làm việc <span style="color:var(--error)">*</span></label>
                <select name="workShiftId" class="form-control" required>
                    <option value="">-- Chọn ca làm việc --</option>
                    <option th:each="ws : ${workShifts}" th:value="${ws.id}" th:text="${ws.name + ' - ' + ws.dayType.label}"
                            th:selected="*{workShiftId} == ${ws.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Hệ số (1.0 - 1.5) <span style="color:var(--error)">*</span></label>
                <input type="number" step="0.01" min="1.0" max="1.5" name="coefficient" class="form-control" th:value="*{coefficient}" required/>
            </div>
            <div class="form-group">
                <label>Hiệu lực từ <span style="color:var(--error)">*</span></label>
                <input type="date" name="effectiveFrom" class="form-control" th:value="*{effectiveFrom}" required/>
            </div>
            <div class="form-group">
                <label>Hiệu lực đến</label>
                <input type="date" name="effectiveTo" class="form-control" th:value="*{effectiveTo}"/>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea name="note" class="form-control" th:text="*{note}"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-modal-close>Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var reopenModal = /*[[${reopenModal}]]*/ null;
    if (reopenModal) {
        window.__reopenModal = reopenModal;
    }
    /*]]>*/
</script>

</th:block>
</body>
</html>
