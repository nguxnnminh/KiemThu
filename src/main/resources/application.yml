server:
  port: 8080
  error:
    whitelabel:
      enabled: false

spring:
  application:
    name: smart-dental

  datasource:
    url: jdbc:mysql://localhost:3306/Clinic?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    encoding: UTF-8

  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    root: INFO
    com.smartdental: DEBUG
    org.hibernate.SQL: DEBUG
